<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deutschtest – Wie gut ist dein Deutsch?</title>
  <meta name="description" content="Kostenloser Deutsch-Wortschatztest für alle Niveaus von A1 bis C2. Schnell, kostenlos und ohne Anmeldung."/>
  <meta name="keywords" content="Deutschtest, German test, Deutsch lernen, Wortschatztest, A1 B1 C1 Deutsch, test your German"/>
  <meta property="og:title" content="Deutschtest – Wie gut ist dein Deutsch?"/>
  <meta property="og:description" content="Kostenloser Wortschatztest von A1 bis C2. Kein Anmeldung nötig."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://deutschmitjens.de"/>
  <link rel="canonical" href="https://deutschmitjens.de"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f5f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b66a3c;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.25rem;
      color: #1a1a1a;
    }

    p {
      font-size: 1rem;
      line-height: 1.65;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .details {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.75rem 0;
      flex-wrap: wrap;
    }

    .detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .detail-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .detail-label {
      font-size: 0.78rem;
      color: #888;
    }

    .lang-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.75rem 0 1.25rem;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border: 2px solid #e0dbd4;
      border-radius: 999px;
      background: #fff;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: #333;
    }

    .lang-btn:hover { border-color: #b66a3c; }
    .lang-btn.active { border-color: #b66a3c; background: #fdf4ef; font-weight: 600; }

    .start-btn {
      display: inline-block;
      background: #b66a3c;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 0.85rem 2.5rem;
      border-radius: 999px;
      text-decoration: none;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    .start-btn:hover { background: #9a5530; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #aaa;
    }

    footer a { color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label" id="ui-label"></div>
    <h1 id="ui-title"></h1>
    <p id="ui-desc1"></p>
    <p id="ui-desc2"></p>

    <div class="details">
      <div class="detail">
        <span class="detail-value">~5 min</span>
        <span class="detail-label" id="ui-duration"></span>
      </div>
      <div class="detail">
        <span class="detail-value">A1–C2</span>
        <span class="detail-label" id="ui-levels"></span>
      </div>
    </div>

    <div class="lang-grid" id="lang-grid"></div>

    <a class="start-btn" id="start-btn" href="/projects/ppvt-test/?lang=de" id="ui-start"></a>
  </div>

  <footer id="ui-footer"></footer>

<script>
const LANGS = [
  { code: 'de', flag: '🇩🇪', label: 'Deutsch' },
  { code: 'en', flag: '🇬🇧', label: 'English' },
  { code: 'fr', flag: '🇫🇷', label: 'Français' },
  { code: 'es', flag: '🇪🇸', label: 'Español' },
  { code: 'ar', flag: '🇸🇦', label: 'العربية' },
  { code: 'ru', flag: '🇷🇺', label: 'Русский' },
  { code: 'zh', flag: '🇨🇳', label: '中文' },
]

const UI = {
  de: { label: 'Kostenloser Deutschtest', title: 'Wie gut ist dein Deutsch?', desc1: 'Dieser Test misst deinen deutschen Wortschatz – von Anfänger bis Fortgeschrittene. Du hörst ein Wort und wählst das passende Bild.', desc2: 'Keine Anmeldung, kein Download. Einfach starten.', duration: 'Dauer', levels: 'Niveaus', start: 'Test starten', footer: 'Ein Forschungsprojekt von <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  en: { label: 'Free German test', title: 'How good is your German?', desc1: 'This test measures your German vocabulary – from beginner to advanced. You hear a word and choose the matching picture.', desc2: 'No registration, no download. Just start.', duration: 'Duration', levels: 'Levels', start: 'Start test', footer: 'A research project by <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  fr: { label: 'Test d\'allemand gratuit', title: 'Quel est votre niveau d\'allemand ?', desc1: 'Ce test mesure votre vocabulaire allemand – du débutant à l\'avancé. Vous entendez un mot et choisissez l\'image correspondante.', desc2: 'Sans inscription, sans téléchargement. Commencez simplement.', duration: 'Durée', levels: 'Niveaux', start: 'Commencer le test', footer: 'Un projet de recherche de <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  es: { label: 'Test de alemán gratuito', title: '¿Qué tan bueno es tu alemán?', desc1: 'Esta prueba mide tu vocabulario alemán – desde principiante hasta avanzado. Escuchas una palabra y eliges la imagen correspondiente.', desc2: 'Sin registro, sin descarga. Simplemente empieza.', duration: 'Duración', levels: 'Niveles', start: 'Iniciar prueba', footer: 'Un proyecto de investigación de <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  ar: { label: 'اختبار ألماني مجاني', title: 'ما مستواك في اللغة الألمانية؟', desc1: 'يقيس هذا الاختبار مفرداتك الألمانية – من المبتدئ إلى المتقدم. تسمع كلمة وتختار الصورة المطابقة.', desc2: 'بدون تسجيل، بدون تنزيل. فقط ابدأ.', duration: 'المدة', levels: 'المستويات', start: 'ابدأ الاختبار', footer: 'مشروع بحثي بقلم <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  ru: { label: 'Бесплатный тест по немецкому', title: 'Как хорошо вы знаете немецкий?', desc1: 'Этот тест измеряет ваш словарный запас немецкого языка – от начинающего до продвинутого. Вы слышите слово и выбираете подходящую картинку.', desc2: 'Без регистрации, без загрузки. Просто начните.', duration: 'Продолжительность', levels: 'Уровни', start: 'Начать тест', footer: 'Исследовательский проект <a href="https://jensschmidtke.de">Jens Schmidtke</a>' },
  zh: { label: '免费德语测试', title: '你的德语水平如何？', desc1: '本测试测量您的德语词汇量——从初学者到高级。您听到一个单词并选择相应的图片。', desc2: '无需注册，无需下载。直接开始。', duration: '时长', levels: '级别', start: '开始测试', footer: '<a href="https://jensschmidtke.de">Jens Schmidtke</a> 的研究项目' },
}

let selected = 'de'

function render() {
  const u = UI[selected] || UI.de
  document.getElementById('ui-label').textContent = u.label
  document.getElementById('ui-title').textContent = u.title
  document.getElementById('ui-desc1').textContent = u.desc1
  document.getElementById('ui-desc2').textContent = u.desc2
  document.getElementById('ui-duration').textContent = u.duration
  document.getElementById('ui-levels').textContent = u.levels
  document.getElementById('start-btn').textContent = u.start
  document.getElementById('start-btn').href = `/projects/ppvt-test/?lang=${selected}`
  document.getElementById('ui-footer').innerHTML = u.footer

  const grid = document.getElementById('lang-grid')
  grid.innerHTML = ''
  LANGS.forEach(l => {
    const btn = document.createElement('button')
    btn.className = 'lang-btn' + (l.code === selected ? ' active' : '')
    btn.innerHTML = `<span>${l.flag}</span><span>${l.label}</span>`
    btn.onclick = () => { selected = l.code; render() }
    grid.appendChild(btn)
  })
}

render()
</script>
</body>
</html>
